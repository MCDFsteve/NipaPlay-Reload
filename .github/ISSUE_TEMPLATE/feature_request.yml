name: 功能建议
description: 提出新功能、改进思路或交互优化建议。
title: "[Feature] "
body:
  - type: markdown
    attributes:
      value: |
        欢迎提出想法。

        为了方便讨论，请尽量说明：
        - 你遇到了什么具体痛点
        - 你希望的解决方式是什么
        - 这个需求更偏向哪个平台或使用场景

  - type: checkboxes
    id: checks
    attributes:
      label: 提交前确认
      options:
        - label: 我已经搜索过现有 Issues，确认这不是重复建议
          required: true
        - label: 我愿意进一步补充使用场景或交互细节
          required: false

  - type: dropdown
    id: category
    attributes:
      label: 功能类别
      options:
        - 播放体验
        - 弹幕 / 字幕
        - 媒体库
        - Emby / Jellyfin / WebDAV / SMB
        - Bangumi / 新番
        - 界面 / 交互
        - 性能 / 稳定性
        - 安装 / 发布
        - 文档
        - 其他
    validations:
      required: true

  - type: input
    id: platforms
    attributes:
      label: 影响平台（如适用）
      description: 可以写一个或多个平台。
      placeholder: 例如 Windows / macOS / Android

  - type: textarea
    id: problem
    attributes:
      label: 想解决的问题
      description: 先说痛点，比直接说方案更有助于讨论。
      placeholder: 例如在电视端使用遥控器浏览媒体库时，当前焦点不够明显，操作效率较低。
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 建议的解决方案
      placeholder: 例如为焦点态增加更强的高亮、缩放和滚动跟随效果。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 你考虑过的替代方案
      placeholder: 例如也可以只增加边框高亮，或者允许用户自定义焦点样式。

  - type: textarea
    id: extra_context
    attributes:
      label: 补充信息
      description: 可以附上截图、草图、参考产品、相关 issue 或 roadmap 想法。
